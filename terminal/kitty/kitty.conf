shell zsh

include ~/.cache/wal/colors-kitty.conf

# Font configuration
font_family      Iosevka
font_size        16.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Transparency and blur
background_opacity 0.92
background_blur 32

# Window configuration
window_padding_width 2
confirm_os_window_close 0
enable_audio_bell no
hide_window_decorations yes
enable_gpu_rendering no
linux_display_server x11

# Cursor
cursor_shape block
cursor_blink_interval 0

# Colors — dark monochrome
background            #0a0b0e
foreground            #c2cae0
selection_background  #252836
selection_foreground  #c2cae0
cursor                #c2cae0

# Black
color0  #0f1014
color8  #252836

# Red (muted)
color1  #6a4a56
color9  #8a6070

# Green (muted)
color2  #4a6a5a
color10 #607a6a

# Yellow (muted)
color3  #6a6a4a
color11 #8a8a60

# Blue (muted)
color4  #3d4566
color12 #5a6490

# Magenta (muted)
color5  #5a4a6a
color13 #756090

# Cyan (muted)
color6  #4a606a
color14 #608090

# White
color7  #828aaa
color15 #c2cae0
